<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNP Hospital - Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            height: 100vh;
            width: 100vw;
            display: flex;
            align-items: center;
            justify-content: center;
            background: url('hospital_bg.png') no-repeat center center/cover;
            position: relative;
            overflow: hidden;
        }

        /* Dark overlay for better text readability */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(8, 20, 48, 0.7) 0%, rgba(2, 8, 23, 0.8) 100%);
            z-index: 1;
        }

        .login-container {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 420px;
            padding: 40px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 24px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3), inset 0 0 0 1px rgba(255, 255, 255, 0.1);
            color: #fff;
            animation: fadeIn 0.8s ease-out forwards;
            opacity: 0;
            transform: translateY(20px);
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo-container {
            text-align: center;
            margin-bottom: 35px;
        }

        .logo-icon {
            font-size: 3rem;
            margin-bottom: 15px;
            color: #4facfe;
            display: inline-block;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 4px 6px rgba(79, 172, 254, 0.3));
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        p.subtitle {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.7);
            font-weight: 300;
        }

        .input-group {
            margin-bottom: 22px;
            position: relative;
        }

        .input-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 8px;
            color: rgba(255, 255, 255, 0.9);
            letter-spacing: 0.5px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            color: #fff;
            font-size: 15px;
            outline: none;
            transition: all 0.3s ease;
        }

        .input-wrapper input:focus {
            background: rgba(0, 0, 0, 0.3);
            border-color: #4facfe;
            box-shadow: 0 0 0 3px rgba(79, 172, 254, 0.2);
        }

        .input-wrapper input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            font-size: 13px;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            color: rgba(255, 255, 255, 0.8);
            cursor: pointer;
        }

        .remember-me input {
            accent-color: #4facfe;
            width: 16px;
            height: 16px;
            cursor: pointer;
        }

        .forgot-password {
            color: #4facfe;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        .forgot-password:hover {
            color: #00f2fe;
            text-decoration: underline;
        }

        .login-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(79, 172, 254, 0.3);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 25px rgba(79, 172, 254, 0.4);
        }

        .login-btn:active {
            transform: translateY(1px);
        }

        .footer {
            margin-top: 30px;
            text-align: center;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.6);
        }

        /* SVG Medical Cross */
        .medical-cross {
            width: 48px;
            height: 48px;
            fill: url(#grad);
            margin-bottom: 12px;
            filter: drop-shadow(0 4px 8px rgba(79, 172, 254, 0.4));
        }

        @media (max-width: 480px) {
            .login-container {
                width: 90%;
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="logo-container">
            <!-- SVG Gradient Definition -->
            <svg width="0" height="0">
                <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" style="stop-color:#4facfe;stop-opacity:1" />
                    <stop offset="100%" style="stop-color:#00f2fe;stop-opacity:1" />
                </linearGradient>
            </svg>
            
            <svg class="medical-cross" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M19 10.5h-4.5V6a1.5 1.5 0 0 0-1.5-1.5h-2A1.5 1.5 0 0 0 9.5 6v4.5H5A1.5 1.5 0 0 0 3.5 12v2A1.5 1.5 0 0 0 5 15.5h4.5V20a1.5 1.5 0 0 0 1.5 1.5h2A1.5 1.5 0 0 0 14.5 20v-4.5H19a1.5 1.5 0 0 0 1.5-1.5v-2A1.5 1.5 0 0 0 19 10.5z" />
            </svg>
            
            <h1>SNP Hospital</h1>
            <p class="subtitle">Healthcare Management Portal</p>
        </div>

        <form onsubmit="event.preventDefault(); alert('Login function triggered!');">
            <div class="input-group">
                <label for="staff-id">Staff ID or Email</label>
                <div class="input-wrapper">
                    <input type="text" id="staff-id" placeholder="Enter your credentials" required>
                </div>
            </div>

            <div class="input-group">
                <label for="password">Password</label>
                <div class="input-wrapper">
                    <input type="password" id="password" placeholder="Enter your password" required>
                </div>
            </div>

            <div class="options">
                <label class="remember-me">
                    <input type="checkbox">
                    <span>Remember me</span>
                </label>
                <a href="#" class="forgot-password">Forgot Password?</a>
            </div>

            <button type="submit" class="login-btn">Secure Login</button>
        </form>

        <div class="footer">
            <p>&copy; 2026 SNP Hospital. All rights reserved.</p>
        </div>
    </div>

</body>
</html>
